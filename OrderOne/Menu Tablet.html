<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OrderOne — Menu Tablet</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&family=Noto+Kufi+Arabic:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f7f4ef;--card:#fff;--border:#e8e4dc;--border2:#d4cfc6;
  --ink:#0f0f0d;--ink2:#555;--ink3:#999;
  --orange:#FF6B35;--green:#22c55e;--amber:#f59e0b;--red:#ef4444;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);min-height:100vh;color:var(--ink)}
header{display:flex;align-items:center;justify-content:space-between;padding:20px 28px;background:var(--card);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:10}
.brand{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;letter-spacing:-.5px}
.brand em{color:var(--orange);font-style:normal}
.header-right{display:flex;align-items:center;gap:12px}
.lang-tog{display:flex;gap:2px;background:#f0ede8;border:1px solid var(--border2);border-radius:8px;padding:2px}
.lb{padding:4px 10px;border-radius:6px;border:none;background:transparent;color:var(--ink3);font-family:'DM Mono',monospace;font-size:11px;cursor:pointer;transition:all .15s}
.lb.on{background:var(--card);color:var(--ink);border:1px solid var(--border)}
.pause-all-btn{padding:8px 16px;border-radius:9px;border:1px solid var(--border2);background:transparent;color:var(--amber);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:all .15s}
.pause-all-btn:hover{background:#fef3c7;border-color:var(--amber)}
.pause-all-btn.paused{background:#fef3c7;border-color:var(--amber);color:#92400e}

.search-bar{padding:16px 28px;border-bottom:1px solid var(--border);background:var(--card)}
.search-input{width:100%;padding:10px 16px;border-radius:10px;border:1px solid var(--border);background:var(--bg);font-family:'DM Sans',sans-serif;font-size:14px;outline:none;color:var(--ink);transition:border-color .15s}
.search-input:focus{border-color:var(--border2)}

.platforms-bar{display:flex;gap:6px;padding:14px 28px;overflow-x:auto;border-bottom:1px solid var(--border);background:var(--card)}
.platforms-bar::-webkit-scrollbar{display:none}
.plat-chip{padding:5px 14px;border-radius:20px;border:1px solid var(--border);background:transparent;font-size:12px;font-family:'DM Sans',sans-serif;cursor:pointer;white-space:nowrap;transition:all .15s;color:var(--ink2)}
.plat-chip.on{color:var(--card);border-color:transparent}

main{padding:20px 28px;max-width:900px;margin:0 auto}

.cat-section{margin-bottom:28px}
.cat-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.cat-name{font-family:'Syne',sans-serif;font-size:16px;font-weight:800;letter-spacing:-.3px}
.cat-count{font-size:12px;color:var(--ink3);font-family:'DM Mono',monospace}

.items-grid{display:flex;flex-direction:column;gap:8px}
.item-row{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px 18px;display:flex;align-items:center;gap:14px;transition:border-color .15s}
.item-row:hover{border-color:var(--border2)}
.item-row.snoozed{opacity:.55;background:#fafaf8}
.item-emoji{font-size:22px;width:36px;text-align:center;flex-shrink:0}
.item-info{flex:1}
.item-name{font-size:14px;font-weight:500;margin-bottom:3px}
.item-name-ar{font-size:13px;color:var(--ink3);margin-bottom:3px}
.item-price{font-size:12px;color:var(--ink3);font-family:'DM Mono',monospace}
.item-plats{display:flex;gap:4px;margin-top:5px}
.item-plat-dot{width:7px;height:7px;border-radius:50%}
.item-status{font-size:11px;padding:4px 10px;border-radius:20px;margin-right:8px;font-family:'DM Mono',monospace;white-space:nowrap}
.item-status.avail{background:#f0fdf4;color:#16a34a;border:1px solid #bbf7d0}
.item-status.snoozed-badge{background:#fef3c7;color:#92400e;border:1px solid #fde68a}
.toggle-btn{width:44px;height:24px;border-radius:12px;border:none;cursor:pointer;position:relative;transition:background .2s;flex-shrink:0}
.toggle-btn.on{background:var(--green)}
.toggle-btn.off{background:#d1d5db}
.toggle-btn::after{content:'';position:absolute;top:2px;width:20px;height:20px;border-radius:50%;background:#fff;transition:left .2s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.toggle-btn.on::after{left:22px}
.toggle-btn.off::after{left:2px}

.stats-footer{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--border);padding:12px 28px;display:flex;gap:24px;align-items:center}
.footer-stat{display:flex;flex-direction:column;align-items:center}
.footer-stat-n{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;line-height:1}
.footer-stat-l{font-size:10px;color:var(--ink3);font-family:'DM Mono',monospace;margin-top:2px}
.footer-note{margin-left:auto;font-size:12px;color:var(--ink3)}

.rtl-page{direction:rtl;text-align:right;font-family:'Noto Kufi Arabic',sans-serif}
.rtl-page header,.rtl-page .search-bar,.rtl-page .platforms-bar,.rtl-page main{direction:rtl}
.rtl-page .header-right{flex-direction:row-reverse}
.rtl-page .item-row{flex-direction:row-reverse}
.rtl-page .item-plats{flex-direction:row-reverse}
.rtl-page .stats-footer{flex-direction:row-reverse}
</style>
</head>
<body id="page">

<header>
  <div class="brand">Order<em>One</em> <span style="font-size:13px;font-weight:400;color:var(--ink3);font-family:'DM Sans',sans-serif" id="hdr-sub">Menu Management</span></div>
  <div class="header-right">
    <div class="lang-tog">
      <button class="lb on" id="lb-en" onclick="setLang('en')">EN</button>
      <button class="lb" id="lb-ar" onclick="setLang('ar')">عر</button>
    </div>
    <button class="pause-all-btn" id="pause-all-btn" onclick="pauseAll()">Pause all items</button>
  </div>
</header>

<div class="search-bar">
  <input class="search-input" id="search-input" placeholder="Search menu items..." oninput="renderMenu()">
</div>

<div class="platforms-bar" id="plats-bar"></div>

<main id="main-content"></main>

<div class="stats-footer">
  <div class="footer-stat"><div class="footer-stat-n" id="fs-avail" style="color:var(--green)">0</div><div class="footer-stat-l" id="fs-avail-l">Available</div></div>
  <div class="footer-stat"><div class="footer-stat-n" id="fs-snoozed" style="color:var(--amber)">0</div><div class="footer-stat-l" id="fs-snoozed-l">Snoozed</div></div>
  <div class="footer-stat"><div class="footer-stat-n" id="fs-total">0</div><div class="footer-stat-l" id="fs-total-l">Total items</div></div>
  <div class="footer-note" id="fs-note">Tap any item to toggle availability</div>
</div>

<script>
var PLAT_LIST=[
  {key:'all',label:'All platforms',label_ar:'كل المنصات',color:'#0f0f0d'},
  {key:'talabat',label:'Talabat',label_ar:'طلبات',color:'#FF6B35'},
  {key:'noon',label:'Noon',label_ar:'نون',color:'#F5C400'},
  {key:'careem',label:'Careem',label_ar:'كريم',color:'#4CAF72'},
  {key:'deliveroo',label:'Deliveroo',label_ar:'ديليفرو',color:'#00CCBC'}
];

var MENU=[
  {cat:'Burgers',cat_ar:'برقر',emoji:'🍔',items:[
    {id:1,name:'Smash Burger',name_ar:'سماش برقر',price:'AED 42',on:true,plats:['talabat','noon','careem','deliveroo']},
    {id:2,name:'Double Cheese',name_ar:'دبل جبن',price:'AED 52',on:true,plats:['talabat','noon','careem','deliveroo']},
    {id:3,name:'Crispy Chicken',name_ar:'كرسبي تشيكن',price:'AED 45',on:false,plats:['talabat','noon','deliveroo']},
    {id:4,name:'Veggie Burger',name_ar:'برقر نباتي',price:'AED 38',on:true,plats:['talabat','noon']}
  ]},
  {cat:'Sides',cat_ar:'مقبلات',emoji:'🍟',items:[
    {id:5,name:'Loaded Fries',name_ar:'فرايز محشية',price:'AED 22',on:true,plats:['talabat','noon','careem','deliveroo']},
    {id:6,name:'Onion Rings',name_ar:'حلقات بصل',price:'AED 18',on:true,plats:['talabat','careem']},
    {id:7,name:'Mac Bites',name_ar:'ماك بايتس',price:'AED 20',on:true,plats:['talabat','noon','careem','deliveroo']}
  ]},
  {cat:'Drinks',cat_ar:'مشروبات',emoji:'🥤',items:[
    {id:8,name:'Lemonade',name_ar:'ليمونادة',price:'AED 16',on:true,plats:['talabat','noon','careem','deliveroo']},
    {id:9,name:'Watermelon Juice',name_ar:'عصير بطيخ',price:'AED 18',on:false,plats:['talabat','noon']},
    {id:10,name:'Soft Drink',name_ar:'مشروب غازي',price:'AED 8',on:true,plats:['talabat','noon','careem','deliveroo']}
  ]},
  {cat:'Desserts',cat_ar:'حلويات',emoji:'🍦',items:[
    {id:11,name:'Nutella Waffle',name_ar:'وافل نوتيلا',price:'AED 28',on:true,plats:['talabat','noon']},
    {id:12,name:'Ice Cream',name_ar:'ايس كريم',price:'AED 15',on:true,plats:['talabat','careem','deliveroo']}
  ]}
];

var LANG='en',activePlat='all',allPaused=false;

var T={
  en:{menu_mgmt:'Menu Management',pause_all:'Pause all items',unpause_all:'Unpause all items',search:'Search menu items...',available:'Available',snoozed:'Snoozed',total:'Total items',tap_note:'Tap any item to toggle availability'},
  ar:{menu_mgmt:'إدارة القايمة',pause_all:'وقّف الكل',unpause_all:'شغّل الكل',search:'ابحث عن صنف...',available:'متوفر',snoozed:'موقوف',total:'كل الأصناف',tap_note:'اضغط أي صنف تغيّر توفره'}
};

function getAllItems(){var a=[];MENU.forEach(function(c){c.items.forEach(function(i){a.push(i);});});return a;}

function setLang(lang){
  LANG=lang;
  var ar=lang==='ar';
  document.getElementById('lb-en').classList.toggle('on',!ar);
  document.getElementById('lb-ar').classList.toggle('on',ar);
  document.getElementById('page').classList.toggle('rtl-page',ar);
  document.getElementById('hdr-sub').textContent=T[lang].menu_mgmt;
  document.getElementById('pause-all-btn').textContent=allPaused?T[lang].unpause_all:T[lang].pause_all;
  document.getElementById('search-input').placeholder=T[lang].search;
  document.getElementById('fs-avail-l').textContent=T[lang].available;
  document.getElementById('fs-snoozed-l').textContent=T[lang].snoozed;
  document.getElementById('fs-total-l').textContent=T[lang].total;
  document.getElementById('fs-note').textContent=T[lang].tap_note;
  renderPlatBar();
  renderMenu();
  updateFooter();
}

function toggleItem(id){
  var item=null;
  MENU.forEach(function(c){c.items.forEach(function(i){if(i.id===id)item=i;});});
  if(item)item.on=!item.on;
  renderMenu();
  updateFooter();
}

function pauseAll(){
  allPaused=!allPaused;
  getAllItems().forEach(function(i){i.on=!allPaused;});
  var btn=document.getElementById('pause-all-btn');
  btn.classList.toggle('paused',allPaused);
  btn.textContent=allPaused?T[LANG].unpause_all:T[LANG].pause_all;
  renderMenu();
  updateFooter();
}

function setPlat(key){
  activePlat=key;
  document.querySelectorAll('.plat-chip').forEach(function(c){
    var isOn=c.dataset.key===key;
    c.classList.toggle('on',isOn);
    if(isOn){var p=PLAT_LIST.find(function(x){return x.key===key;});c.style.background=p?p.color:'var(--ink)';}
    else{c.style.background='';}
  });
  renderMenu();
}

function renderPlatBar(){
  var bar=document.getElementById('plats-bar');
  bar.innerHTML=PLAT_LIST.map(function(p){
    var lbl=LANG==='ar'?p.label_ar:p.label;
    var isOn=activePlat===p.key;
    return '<button class="plat-chip'+(isOn?' on':'')+'" data-key="'+p.key+'" onclick="setPlat(\''+p.key+'\')" style="'+(isOn?'background:'+p.color+';color:#fff;border-color:'+p.color:'')+'">'+lbl+'</button>';
  }).join('');
}

function renderMenu(){
  var q=document.getElementById('search-input').value.toLowerCase();
  var html='';
  MENU.forEach(function(cat){
    var items=cat.items.filter(function(i){
      if(activePlat!=='all'&&!i.plats.includes(activePlat))return false;
      if(q&&i.name.toLowerCase().indexOf(q)===-1&&i.name_ar.indexOf(q)===-1)return false;
      return true;
    });
    if(!items.length)return;
    var cname=LANG==='ar'?cat.cat_ar:cat.cat;
    html+='<div class="cat-section">';
    html+='<div class="cat-header"><span class="cat-name">'+cat.emoji+' '+cname+'</span><span class="cat-count">'+items.length+' items</span></div>';
    html+='<div class="items-grid">';
    items.forEach(function(item){
      var iname=LANG==='ar'?item.name_ar:item.name;
      var iname2=LANG==='ar'?item.name:item.name_ar;
      var statusHtml=item.on?'<span class="item-status avail">'+(LANG==='ar'?'متوفر':'Available')+'</span>':'<span class="item-status snoozed-badge">'+(LANG==='ar'?'موقوف':'Snoozed')+'</span>';
      var platsHtml=item.plats.map(function(pk){var pl=PLAT_LIST.find(function(x){return x.key===pk;});return pl?'<span class="item-plat-dot" style="background:'+pl.color+'" title="'+pl.label+'"></span>':'';}).join('');
      html+='<div class="item-row'+(item.on?'':' snoozed')+'" onclick="toggleItem('+item.id+')">';
      html+='<span class="item-emoji">'+cat.emoji+'</span>';
      html+='<div class="item-info"><div class="item-name">'+iname+'</div><div class="item-name-ar">'+iname2+'</div><div class="item-price">'+item.price+'</div><div class="item-plats">'+platsHtml+'</div></div>';
      html+=statusHtml;
      html+='<button class="toggle-btn '+(item.on?'on':'off')+'" onclick="event.stopPropagation();toggleItem('+item.id+')"></button>';
      html+='</div>';
    });
    html+='</div></div>';
  });
  document.getElementById('main-content').innerHTML=html||'<div style="text-align:center;padding:60px 0;color:var(--ink3)">No items found</div>';
}

function updateFooter(){
  var all=getAllItems();
  var avail=all.filter(function(i){return i.on;}).length;
  document.getElementById('fs-avail').textContent=avail;
  document.getElementById('fs-snoozed').textContent=all.length-avail;
  document.getElementById('fs-total').textContent=all.length;
}

renderPlatBar();
renderMenu();
updateFooter();
</script>
</body>
</html>
