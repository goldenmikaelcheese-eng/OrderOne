<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OrderOne — Kitchen Display</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#080808;--card:#111;--border:#1c1c1c;--border2:#242424;--t1:#f0ede8;--t2:#555;--t3:#2a2a2a;--orange:#FF6B35;--green:#22c55e;--amber:#f59e0b;--red:#ef4444}
body.light{--bg:#f0f0f0;--card:#fff;--border:#e0e0e0;--border2:#d0d0d0;--t1:#0f0f0d;--t2:#888;--t3:#f0f0f0}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--t1);min-height:100vh;display:flex;flex-direction:column;transition:background .3s}

header{display:flex;align-items:center;justify-content:space-between;padding:14px 24px;border-bottom:1px solid var(--border);flex-shrink:0;background:var(--bg)}
.brand{font-family:'Syne',sans-serif;font-size:18px;font-weight:800;letter-spacing:-.5px;color:var(--t1)}
.brand em{color:var(--orange);font-style:normal}
.hdr-right{display:flex;align-items:center;gap:10px}
.clock{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;color:var(--t1);letter-spacing:-.5px}
.icon-btn{background:var(--card);border:1px solid var(--border2);border-radius:8px;color:var(--t2);font-size:14px;width:34px;height:34px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.icon-btn:hover{color:var(--t1)}
.live{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--green);font-family:'DM Mono',monospace}
.ldot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

/* FILTER BAR */
.filter-bar{display:flex;align-items:center;gap:8px;padding:10px 24px;border-bottom:1px solid var(--border);background:var(--bg);flex-wrap:wrap}
.filter-chip{padding:5px 14px;border-radius:20px;border:1px solid var(--border2);background:var(--card);font-size:12px;font-family:'DM Sans',sans-serif;cursor:pointer;color:var(--t2);transition:all .15s;white-space:nowrap}
.filter-chip:hover{color:var(--t1)}
.filter-chip.on{color:#fff;border-color:transparent;font-weight:600}
.stats-chips{display:flex;gap:8px;margin-left:auto}
.stat-chip{padding:5px 12px;border-radius:20px;font-size:11px;font-family:'DM Mono',monospace;border:1px solid var(--border2);background:var(--card);color:var(--t2)}
.stat-chip.urgent{border-color:#7f1d1d;color:var(--red);background:#1a0404}
body.light .stat-chip.urgent{background:#fee2e2;border-color:#fca5a5}

/* GRID */
.kds-grid{flex:1;display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px;padding:16px 24px;overflow-y:auto;align-content:start}

/* ORDER CARD */
.kcard{background:var(--card);border:2px solid var(--border);border-radius:14px;display:flex;flex-direction:column;overflow:hidden;transition:border-color .2s;animation:cardin .25s ease}
@keyframes cardin{from{opacity:0;transform:scale(.96)}to{opacity:1;transform:scale(1)}}
.kcard.urgent{border-color:#7f1d1d;animation:urgpulse 1.5s infinite}
@keyframes urgpulse{0%,100%{border-color:#7f1d1d}50%{border-color:#ef4444}}
.kcard.ready{border-color:#166534;opacity:.6}
.kcard.bar{border-left:4px solid #60a5fa}

/* CARD HEADER */
.kcard-hdr{padding:12px 14px 10px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border)}
.plat-stripe{width:4px;height:36px;border-radius:2px;flex-shrink:0}
.kcard-plat{font-family:'Syne',sans-serif;font-size:16px;font-weight:800;letter-spacing:-.3px}
.kcard-num{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;letter-spacing:-.5px;flex:1;text-align:right}
.sec-tag{font-size:9px;padding:2px 7px;border-radius:20px;font-family:'DM Mono',monospace;font-weight:600}
.sec-tag.bar{background:#0f172a;color:#60a5fa}
body.light .sec-tag.bar{background:#eff6ff;color:#1d4ed8}
.sec-tag.rest{background:#0f2011;color:#4ade80}
body.light .sec-tag.rest{background:#f0fdf4;color:#15803d}

/* ITEMS */
.kcard-items{padding:10px 14px;flex:1}
.kitem{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--border);cursor:pointer;transition:opacity .15s}
.kitem:last-child{border-bottom:none}
.kitem.done{opacity:.35}
.kitem-qty{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;color:var(--orange);min-width:28px;line-height:1}
.kitem-name{font-size:14px;font-weight:500;flex:1;color:var(--t1)}
.kitem.done .kitem-name{text-decoration:line-through;color:var(--t2)}
.kitem-check{width:20px;height:20px;border-radius:50%;border:2px solid var(--border2);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s}
.kitem.done .kitem-check{background:var(--green);border-color:var(--green);color:#fff;font-size:11px}

/* NOTE */
.kcard-note{padding:7px 14px;background:#1c1000;font-size:12px;color:var(--amber);border-top:1px solid var(--border)}
body.light .kcard-note{background:#fffbeb;color:#92400e}

/* TIMER BAR */
.kcard-timer{padding:8px 14px;border-top:1px solid var(--border)}
.ktimer-track{height:4px;background:var(--border2);border-radius:2px;overflow:hidden;margin-bottom:4px}
.ktimer-fill{height:100%;border-radius:2px;transition:background .5s}
.ktimer-row{display:flex;justify-content:space-between;align-items:center}
.ktimer-lbl{font-size:10px;color:var(--t2);font-family:'DM Mono',monospace}
.ktimer-val{font-size:11px;font-family:'DM Mono',monospace;font-weight:600}

/* FOOTER ACTIONS */
.kcard-footer{display:flex;border-top:1px solid var(--border)}
.kbtn{flex:1;padding:11px;border:none;font-family:'Syne',sans-serif;font-weight:800;font-size:12px;cursor:pointer;transition:background .15s}
.kbtn-ready{background:#052e16;color:#4ade80}
body.light .kbtn-ready{background:#dcfce7;color:#15803d}
.kbtn-ready:hover{background:#073a0f}
.kbtn-done{background:#0f172a;color:#60a5fa}
body.light .kbtn-done{background:#eff6ff;color:#1d4ed8}
.kbtn-done:hover{background:#1e293b}

/* EMPTY */
.kds-empty{flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px;color:var(--t2);padding:48px}
.kds-empty-title{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;color:var(--t2)}
.kds-empty-sub{font-size:14px}

/* ADD DEMO ROW */
.demo-bar{padding:8px 24px;border-top:1px solid var(--border);background:var(--bg);display:flex;gap:8px;flex-shrink:0}
.demo-input{flex:1;padding:8px 12px;border-radius:8px;border:1px solid var(--border2);background:var(--card);color:var(--t1);font-family:'DM Sans',sans-serif;font-size:13px;outline:none}
.demo-input:focus{border-color:var(--orange)}
.demo-select{padding:8px 10px;border-radius:8px;border:1px solid var(--border2);background:var(--card);color:var(--t1);font-family:'DM Sans',sans-serif;font-size:12px;outline:none}
.demo-select option{background:var(--card);color:var(--t1)}
.demo-btn{padding:8px 14px;border-radius:8px;border:none;background:var(--orange);color:#fff;font-family:'Syne',sans-serif;font-weight:800;font-size:13px;cursor:pointer;transition:opacity .15s}
.demo-btn:hover{opacity:.85}
</style>
</head>
<body>

<header>
  <div class="brand">Order<em>One</em> <span style="font-size:12px;color:var(--t2);font-weight:400;font-family:'DM Sans',sans-serif">Kitchen Display</span></div>
  <div class="hdr-right">
    <div class="live"><span class="ldot"></span>Live</div>
    <div class="clock" id="clock">--:--</div>
    <button class="icon-btn" id="mode-btn" onclick="toggleMode()">🌙</button>
    <button class="icon-btn" onclick="refreshKDS()">↻</button>
  </div>
</header>

<div class="filter-bar">
  <button class="filter-chip on" id="f-all" onclick="setFilter('all')" style="background:#FF6B35;border-color:#FF6B35">All</button>
  <button class="filter-chip" id="f-rest" onclick="setFilter('rest')">🍔 Restaurant</button>
  <button class="filter-chip" id="f-bar" onclick="setFilter('bar')">🍹 Bar</button>
  <div class="stats-chips">
    <span class="stat-chip" id="stat-active">0 active</span>
    <span class="stat-chip urgent" id="stat-urgent" style="display:none">0 urgent</span>
  </div>
</div>

<div class="kds-grid" id="kds-grid"></div>

<div class="demo-bar">
  <span style="font-size:12px;color:var(--t2);font-family:'DM Mono',monospace">Auto-syncing with POS Terminal every 3 seconds</span>
  <span class="ldot" style="width:6px;height:6px;border-radius:50%;background:var(--green);animation:blink 2s infinite;display:inline-block;margin-left:6px"></span>
</div>

<script>
var PLAT={
  talabat:{label:'Talabat',color:'#FF6B35'},
  noon:{label:'Noon',color:'#d4a800'},
  careem:{label:'Careem',color:'#4CAF72'},
  hungerstation:{label:'HungerStation',color:'#FF2D55'},
  deliveroo:{label:'Deliveroo',color:'#00CCBC'},
  instashop:{label:'InstaShop',color:'#A855F7'}
};

var SAMPLE_ITEMS={
  rest:[
    [{qty:1,name:'Smash Burger'},{qty:2,name:'Loaded Fries'},{qty:1,name:'Lemonade'}],
    [{qty:2,name:'Double Cheese'},{qty:1,name:'Onion Rings'}],
    [{qty:1,name:'Crispy Chicken'},{qty:1,name:'Mac Bites'},{qty:2,name:'Soft Drink'}],
    [{qty:3,name:'Smash Burger'},{qty:3,name:'Loaded Fries'},{qty:2,name:'Watermelon Juice'}],
    [{qty:1,name:'Veggie Burger'},{qty:1,name:'Nutella Waffle'}]
  ],
  bar:[
    [{qty:2,name:'Lemonade'},{qty:1,name:'Watermelon Juice'}],
    [{qty:3,name:'Soft Drink'},{qty:1,name:'Lemonade'}],
    [{qty:2,name:'Watermelon Juice'},{qty:2,name:'Soft Drink'}]
  ]
};

var NOTES=['No onions please','Extra sauce','Allergic to nuts','Well done','No ice'];

var orders=[];
var darkMode=true,activeFilter='all';

function loadFromPOS(){
  try{
    var data=localStorage.getItem('orderone_kds');
    if(data){
      var loaded=JSON.parse(data);
      // Merge: keep local done states, add new orders from POS
      loaded.forEach(function(o){
        var existing=orders.find(function(x){return x.id===o.id;});
        if(!existing){
          // New order from POS — add done:false to items
          o.items=o.items.map(function(it){return{qty:it.qty,name:it.name,done:false};});
          orders.unshift(o);
        } else {
          // Update status from POS but keep done states
          existing.status=o.status;
        }
      });
      // Remove orders that POS has deleted
      orders=orders.filter(function(o){return loaded.find(function(x){return x.id===o.id;});});
    }
  }catch(e){}
}
var URGENT_THRESHOLD=600000; // 10 mins

function elapsed(o){return Date.now()-o.at;}
function elapsedStr(o){var s=Math.floor(elapsed(o)/1000);var m=Math.floor(s/60);var sc=s%60;return m+'m '+(sc<10?'0':'')+sc+'s';}
function timerColor(o){var e=elapsed(o);if(e>URGENT_THRESHOLD)return'#ef4444';if(e>300000)return'#f59e0b';return'#22c55e';}
function timerPct(o){return Math.min(100,Math.round(elapsed(o)/URGENT_THRESHOLD*100));}

function toggleMode(){
  darkMode=!darkMode;
  document.body.classList.toggle('light',!darkMode);
  document.getElementById('mode-btn').textContent=darkMode?'🌙':'☀️';
}

function refreshKDS(){renderKDS();}

function setFilter(f){
  activeFilter=f;
  var colors={all:'#FF6B35',rest:'#22c55e',bar:'#60a5fa'};
  ['all','rest','bar'].forEach(function(id){
    var btn=document.getElementById('f-'+id);
    btn.classList.toggle('on',id===f);
    if(id===f){btn.style.background=colors[id];btn.style.borderColor=colors[id];btn.style.color='#fff';}
    else{btn.style.background='';btn.style.borderColor='';btn.style.color='';}
  });
  renderKDS();
}

function toggleItem(orderId,itemIdx){
  var o=orders.find(function(x){return x.id===orderId;});
  if(o&&o.items[itemIdx])o.items[itemIdx].done=!o.items[itemIdx].done;
  renderKDS();
}

function markReady(id){
  var o=orders.find(function(x){return x.id===id;});
  if(o)o.status='ready';
  renderKDS();updateStats();
}

function dismissOrder(id){
  orders=orders.filter(function(x){return x.id!==id;});
  renderKDS();updateStats();
}

function addOrder(){
  var num=document.getElementById('demo-num').value.trim();
  var plat=document.getElementById('demo-plat').value;
  var sec=document.getElementById('demo-sec').value;
  if(!num)return;
  document.getElementById('demo-num').value='';
  var pool=SAMPLE_ITEMS[sec];
  var rawItems=pool[Math.floor(Math.random()*pool.length)];
  var items=rawItems.map(function(it){return{qty:it.qty,name:it.name,done:false};});
  var note=Math.random()<0.3?NOTES[Math.floor(Math.random()*NOTES.length)]:'';
  orders.unshift({id:nextId++,num:num,plat:plat,section:sec,at:Date.now(),status:'preparing',note:note,items:items});
  renderKDS();updateStats();
}

function renderKDS(){
  var grid=document.getElementById('kds-grid');
  var filtered=orders.filter(function(o){
    if(activeFilter==='rest')return o.section==='rest';
    if(activeFilter==='bar')return o.section==='bar';
    return true;
  });
  if(!filtered.length){
    grid.innerHTML='<div class="kds-empty"><div class="kds-empty-title">Kitchen clear</div><div class="kds-empty-sub">No active orders — waiting for next order</div></div>';
    return;
  }
  var html='';
  filtered.forEach(function(o){
    var p=PLAT[o.plat];
    var isBar=o.section==='bar';
    var isReady=o.status==='ready';
    var isUrgent=elapsed(o)>URGENT_THRESHOLD&&!isReady;
    var allDone=o.items.every(function(it){return it.done;});
    var col=timerColor(o);
    var pct=timerPct(o);
    var itemsHtml=o.items.map(function(it,idx){
      return '<div class="kitem'+(it.done?' done':'')+'" onclick="toggleItem('+o.id+','+idx+')">'
        +'<span class="kitem-qty">'+it.qty+'×</span>'
        +'<span class="kitem-name">'+it.name+'</span>'
        +'<span class="kitem-check">'+(it.done?'✓':'')+'</span>'
        +'</div>';
    }).join('');
    var noteHtml=o.note?'<div class="kcard-note">📝 '+o.note+'</div>':'';
    var footerHtml=isReady
      ?'<div class="kcard-footer"><button class="kbtn kbtn-done" onclick="dismissOrder('+o.id+')">Collected — dismiss</button></div>'
      :'<div class="kcard-footer"><button class="kbtn kbtn-ready" onclick="markReady('+o.id+')">'+(allDone?'All done — Mark ready':'Mark ready')+'</button></div>';
    html+='<div class="kcard'+(isUrgent?' urgent':'')+(isReady?' ready':'')+(isBar?' bar':'')+'">';
    html+='<div class="kcard-hdr">';
    html+='<div class="plat-stripe" style="background:'+p.color+'"></div>';
    html+='<div style="flex:1"><div class="kcard-plat" style="color:'+p.color+'">'+p.label+'</div><span class="sec-tag '+(isBar?'bar':'rest')+'">'+(isBar?'Bar':'Restaurant')+'</span></div>';
    html+='<span class="kcard-num" style="color:'+p.color+'">'+o.num+'</span>';
    html+='</div>';
    html+='<div class="kcard-items">'+itemsHtml+'</div>';
    html+=noteHtml;
    html+='<div class="kcard-timer"><div class="ktimer-track"><div class="ktimer-fill" style="width:'+pct+'%;background:'+col+'"></div></div><div class="ktimer-row"><span class="ktimer-lbl">Time elapsed</span><span class="ktimer-val" style="color:'+col+'">'+elapsedStr(o)+'</span></div></div>';
    html+=footerHtml;
    html+='</div>';
  });
  grid.innerHTML=html;
}

function updateStats(){
  var active=orders.filter(function(o){return o.status==='preparing';}).length;
  var urgent=orders.filter(function(o){return o.status==='preparing'&&elapsed(o)>URGENT_THRESHOLD;}).length;
  document.getElementById('stat-active').textContent=active+' active';
  var ub=document.getElementById('stat-urgent');
  if(urgent>0){ub.style.display='block';ub.textContent=urgent+' urgent';}
  else{ub.style.display='none';}
}

function tick(){
  var n=new Date(),pad=function(x){return x<10?'0'+x:x;};
  document.getElementById('clock').textContent=pad(n.getHours())+':'+pad(n.getMinutes());
  renderKDS();updateStats();
}

loadFromPOS();
tick();
setInterval(function(){loadFromPOS();tick();},3000);
</script>
</body>
</html>
