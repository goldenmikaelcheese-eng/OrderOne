<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>OrderOne — POS Terminal</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
/* DARK MODE (default) */
:root {
  --bg:#0a0a0a;--s1:#141414;--s2:#1c1c1c;--b1:#242424;--b2:#2e2e2e;
  --t1:#f0ede8;--t2:#888;--t3:#444;
  --orange:#FF6B35;--yellow:#F5C400;--greenp:#4CAF72;
  --pink:#FF2D55;--teal:#00CCBC;--purple:#A855F7;
  --green:#22c55e;--amber:#f59e0b;--red:#ef4444;
  --card-bg:#141414;--input-bg:#1c1c1c;
}
/* LIGHT MODE */
body.light {
  --bg:#f5f5f5;--s1:#ffffff;--s2:#f0f0f0;--b1:#e0e0e0;--b2:#d0d0d0;
  --t1:#0f0f0d;--t2:#666;--t3:#999;
  --card-bg:#ffffff;--input-bg:#f0f0f0;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--t1);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px;transition:background .3s,color .3s}

/* DEVICE FRAME - sized for Sunmi V2s 1440x720 portrait */
.frame{width:340px;background:var(--s2);border-radius:28px;padding:6px;border:1px solid var(--b1);box-shadow:0 8px 40px rgba(0,0,0,.3)}
.device{background:var(--bg);border-radius:22px;overflow:hidden;height:620px;display:flex;flex-direction:column;transition:background .3s}

/* TOP BAR */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:12px 14px 10px;border-bottom:1px solid var(--b1);flex-shrink:0;background:var(--bg)}
.brand{font-family:'Syne',sans-serif;font-size:16px;font-weight:800;letter-spacing:-.5px;color:var(--t1)}
.brand em{color:var(--orange);font-style:normal}
.topright{display:flex;align-items:center;gap:8px}
.mode-btn{background:var(--s2);border:1px solid var(--b2);border-radius:8px;color:var(--t2);font-size:14px;width:30px;height:28px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.mode-btn:hover{color:var(--t1)}
.refresh-btn{background:var(--s2);border:1px solid var(--b2);border-radius:8px;color:var(--t2);font-size:13px;width:30px;height:28px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.refresh-btn:hover{color:var(--t1)}
.live{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--green);font-family:'DM Mono',monospace}
.ldot{width:5px;height:5px;border-radius:50%;background:var(--green);animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

/* TABS */
.tabs{display:flex;border-bottom:1px solid var(--b1);flex-shrink:0;background:var(--bg)}
.tab{flex:1;padding:9px 4px;font-size:11px;color:var(--t2);border:none;background:transparent;cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;font-family:'DM Sans',sans-serif}
.tab.on{color:var(--t1);font-weight:600;border-bottom-color:var(--orange)}

/* PANELS */
.panel{display:none;flex:1;overflow-y:auto;flex-direction:column}
.panel.on{display:flex}

/* ADD ROW */
.add-row{display:flex;gap:6px;padding:8px 10px;border-bottom:1px solid var(--b1);flex-shrink:0;background:var(--bg)}
.add-row input,.add-row select{background:var(--input-bg);border:1px solid var(--b2);border-radius:8px;color:var(--t1);font-family:'DM Sans',sans-serif;font-size:12px;padding:7px 9px;outline:none;transition:border-color .15s}
.add-row input:focus,.add-row select:focus{border-color:var(--orange)}
.add-row input{flex:1;min-width:0}
.add-row select{width:106px}
.add-row select option{background:var(--s2);color:var(--t1)}
.plus-btn{background:var(--orange);border:none;border-radius:8px;color:#fff;font-size:20px;width:35px;height:35px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:opacity .15s}
.plus-btn:hover{opacity:.85}

/* BUSY BAR */
.busy-bar{display:none;align-items:center;justify-content:space-between;padding:7px 12px;background:#1a0800;border-bottom:1px solid #3d1800;flex-shrink:0}
body.light .busy-bar{background:#fff3e0;border-bottom-color:#ffcc80}
.busy-bar.show{display:flex}
.busy-txt{font-size:11px;color:var(--amber);font-weight:500}
.busy-off{font-size:10px;padding:3px 9px;border-radius:6px;border:1px solid var(--amber);background:transparent;color:var(--amber);cursor:pointer}

/* INCOMING */
.incoming{display:none;flex-direction:column;background:#060f06;border-bottom:1px solid #163016;flex-shrink:0}
body.light .incoming{background:#f0fff4;border-bottom-color:#86efac}
.incoming.show{display:flex;animation:dropin .2s ease}
@keyframes dropin{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
.inc-top{display:flex;align-items:center;gap:10px;padding:11px 13px 7px}
.inc-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;animation:ipulse .75s infinite}
@keyframes ipulse{0%,100%{transform:scale(1)}50%{transform:scale(1.6);opacity:.6}}
.inc-lbl{font-size:11px;color:#16a34a;font-weight:600;flex:1}
body.light .inc-lbl{color:#15803d}
.inc-num{font-family:'Syne',sans-serif;font-size:16px;font-weight:800}
.inc-btns{display:flex;border-top:1px solid #163016}
body.light .inc-btns{border-top-color:#86efac}
.acc{flex:1;padding:11px;border:none;background:#052a0a;color:#4ade80;font-family:'Syne',sans-serif;font-weight:800;font-size:13px;cursor:pointer;border-right:1px solid #163016;transition:background .15s}
body.light .acc{background:#dcfce7;color:#15803d;border-right-color:#86efac}
.acc:hover{background:#073a0f}
body.light .acc:hover{background:#bbf7d0}
.rej{flex:1;padding:11px;border:none;background:#1a0404;color:#f87171;font-family:'Syne',sans-serif;font-weight:800;font-size:13px;cursor:pointer;transition:background .15s}
body.light .rej{background:#fef2f2;color:#dc2626}
.rej:hover{background:#280606}
body.light .rej:hover{background:#fee2e2}

/* ORDERS */
.olist{padding:7px;display:flex;flex-direction:column;gap:6px;flex:1;overflow-y:auto}
.ocard{background:var(--card-bg);border:1px solid var(--b1);border-radius:12px;padding:11px;cursor:pointer;transition:border-color .15s}
.ocard:hover{border-color:var(--b2)}
.ocard.ready{border-color:#166534;background:#052e16}
body.light .ocard.ready{border-color:#86efac;background:#f0fff4}
.ocard.expired{opacity:.5;border-color:#7f1d1d}
.otop{display:flex;align-items:center;gap:7px;margin-bottom:0}
.pbadge{font-size:10px;font-weight:600;padding:3px 8px;border-radius:20px;font-family:'DM Mono',monospace;flex-shrink:0}
.onum{font-family:'Syne',sans-serif;font-size:18px;font-weight:800;letter-spacing:-.5px;flex:1;color:var(--t1)}
.oage{font-size:10px;color:var(--t2);font-family:'DM Mono',monospace}
.oarrow{font-size:9px;color:var(--t3);transition:transform .2s}
.oarrow.open{transform:rotate(180deg)}

/* DETAILS */
.odetails{display:none;border-top:1px solid var(--b1);margin-top:9px;padding-top:7px}
.odetails.open{display:block}
.drow{display:flex;gap:8px;padding:4px 0;border-bottom:1px solid var(--b1);font-size:12px}
.drow:last-of-type{border-bottom:none}
.dqty{font-family:'DM Mono',monospace;font-size:11px;color:var(--t2);min-width:22px}
.dname{flex:1;color:var(--t1)}
.dtotal{display:flex;justify-content:space-between;padding-top:6px;margin-top:4px;border-top:1px solid var(--b2)}
.dtotal-l{font-size:11px;color:var(--t2)}
.dtotal-n{font-family:'Syne',sans-serif;font-size:14px;font-weight:800;color:var(--t1)}
.dnote{font-size:11px;color:var(--amber);background:#1c1000;border-radius:6px;padding:5px 8px;margin-top:6px}
body.light .dnote{background:#fffbeb;color:#92400e}

/* TIMER */
.timer-wrap{margin:8px 0}
.ttrack{height:3px;background:var(--b2);border-radius:2px;overflow:hidden;margin-bottom:3px}
.tfill{height:100%;border-radius:2px;transition:background .5s}
.tlbl{font-size:10px;color:var(--t2);font-family:'DM Mono',monospace;display:flex;justify-content:space-between}

/* BUTTONS */
.ocard-btns{display:flex;gap:6px;margin-top:9px}
.obtn{padding:9px;border-radius:9px;border:none;font-family:'Syne',sans-serif;font-weight:800;font-size:12px;cursor:pointer;transition:opacity .15s;flex:1}
.obtn-green{background:var(--green);color:#fff}
.obtn-green:hover{opacity:.85}
.obtn-gray{background:var(--s2);color:var(--t1);border:1px solid var(--b2);font-size:11px}
.obtn-red{background:#450a0a;color:#fca5a5;border:1px solid #7f1d1d;font-size:11px}
body.light .obtn-red{background:#fee2e2;color:#dc2626;border-color:#fca5a5}
.reprint-btn{background:transparent;color:var(--t2);border:1px solid var(--b2);font-size:10px;padding:5px 9px;border-radius:8px;cursor:pointer;transition:all .15s;white-space:nowrap;flex:0}
.reprint-btn:hover{color:var(--t1);background:var(--s2)}
.reprint-btn.done{color:var(--green);border-color:#166534}

/* EMPTY */
.empty-state{text-align:center;padding:40px 20px;color:var(--t2);font-size:13px;flex:1;display:flex;align-items:center;justify-content:center}

/* STATS */
.statsbar{display:flex;border-top:1px solid var(--b1);flex-shrink:0;background:var(--bg)}
.sstat{flex:1;padding:10px 0;text-align:center;border-right:1px solid var(--b1)}
.sstat:last-child{border-right:none}
.sstat-n{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;line-height:1;color:var(--t1)}
.sstat-l{font-size:9px;color:var(--t2);font-family:'DM Mono',monospace;margin-top:2px}
.botbar{padding:7px 10px;border-top:1px solid var(--b1);flex-shrink:0;background:var(--bg)}
.busy-main-btn{width:100%;padding:10px;border-radius:9px;border:1px solid var(--b2);background:var(--s2);color:var(--amber);font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;cursor:pointer;transition:all .15s}
.busy-main-btn.on{background:#1a0800;border-color:#3d1800;color:var(--red)}
body.light .busy-main-btn.on{background:#fff3e0;border-color:#ffcc80;color:#b45309}

/* DISPLAY PANEL */
.disp-panel{background:#060606;flex:1;display:flex;flex-direction:column;overflow-y:auto}
body.light .disp-panel{background:#f8fafc}
.disp-hdr{padding:12px 14px 8px;border-bottom:1px solid #111;flex-shrink:0}
body.light .disp-hdr{border-bottom-color:#e2e8f0}
.disp-title{font-family:'Syne',sans-serif;font-size:14px;font-weight:800;color:#fff;letter-spacing:-.3px}
body.light .disp-title{color:#0f172a}
.disp-sub{font-size:10px;color:#333;margin-top:3px}
body.light .disp-sub{color:#94a3b8}
.disp-body{padding:10px 12px;flex:1}
.disp-sec{font-size:9px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:#222;margin-bottom:8px;font-family:'DM Mono',monospace}
body.light .disp-sec{color:#94a3b8}
.rtile{background:#0e0e0e;border:1px solid #1a1a1a;border-radius:12px;padding:12px 14px;display:flex;align-items:center;gap:10px;margin-bottom:7px}
body.light .rtile{background:#fff;border-color:#e2e8f0}
.rtile-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.rtile-num{font-family:'Syne',sans-serif;font-size:26px;font-weight:800;line-height:1;flex:1}
.rtile-plat{font-size:10px;font-family:'DM Mono',monospace}
.rtile-badge{font-size:9px;padding:3px 7px;border-radius:20px;background:#052e16;color:var(--green);font-family:'DM Mono',monospace}
body.light .rtile-badge{background:#dcfce7;color:#16a34a}
.qchips{display:flex;flex-wrap:wrap;gap:5px}
.qchip{background:#0a0a0a;border:1px solid #1a1a1a;border-radius:8px;padding:6px 11px;display:flex;align-items:center;gap:7px}
body.light .qchip{background:#f8fafc;border-color:#e2e8f0}
.qdot{width:5px;height:5px;border-radius:50%}
.qnum{font-family:'Syne',sans-serif;font-size:13px;font-weight:800}
.qinfo{font-size:10px;color:var(--t2);font-family:'DM Mono',monospace}
.disp-empty{text-align:center;padding:30px 0;color:#333;font-size:13px}
body.light .disp-empty{color:#94a3b8}

/* SCROLLBAR */
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--b2);border-radius:2px}
</style>
</head>
<body>
<div class="frame">
<div class="device">

<div class="topbar">
  <div class="brand">Order<em>One</em></div>
  <div class="topright">
    <button class="refresh-btn" onclick="refreshAll()" title="Refresh">↻</button>
    <button class="mode-btn" onclick="toggleMode()" id="mode-btn" title="Toggle mode">🌙</button>
    <div class="live"><span class="ldot"></span>Live</div>
  </div>
</div>

<div class="tabs">
  <button class="tab on" id="t-orders" onclick="switchTab('orders')">Orders</button>
  <button class="tab" id="t-disp" onclick="switchTab('disp')">Display</button>
</div>

<!-- ORDERS -->
<div class="panel on" id="p-orders">
  <div class="add-row">
    <input type="text" id="inp-num" placeholder="Order #1042">
    <select id="inp-plat">
      <option value="talabat">Talabat</option>
      <option value="noon">Noon</option>
      <option value="careem">Careem</option>
      <option value="hungerstation">HungerStation</option>
      <option value="deliveroo">Deliveroo</option>
      <option value="instashop">InstaShop</option>
    </select>
    <button class="plus-btn" onclick="addOrder()">+</button>
  </div>

  <div class="busy-bar" id="busy-bar">
    <span class="busy-txt">Busy mode — orders paused</span>
    <button class="busy-off" onclick="toggleBusy()">Turn off</button>
  </div>

  <div class="incoming" id="incoming">
    <div class="inc-top">
      <span class="inc-dot" id="inc-dot"></span>
      <span class="inc-lbl">New order incoming</span>
      <span class="inc-num" id="inc-num"></span>
    </div>
    <div class="inc-btns">
      <button class="acc" onclick="acceptOrder()">Accept</button>
      <button class="rej" onclick="rejectOrder()">Reject</button>
    </div>
  </div>

  <div class="olist" id="olist"></div>

  <div class="statsbar">
    <div class="sstat"><div class="sstat-n" id="s-act">0</div><div class="sstat-l">Active</div></div>
    <div class="sstat"><div class="sstat-n" style="color:var(--green)" id="s-rdy">0</div><div class="sstat-l">Ready</div></div>
    <div class="sstat"><div class="sstat-n" id="s-don">0</div><div class="sstat-l">Done</div></div>
  </div>
  <div class="botbar">
    <button class="busy-main-btn" id="busy-main-btn" onclick="toggleBusy()">Busy mode</button>
  </div>
</div>

<!-- DISPLAY -->
<div class="panel" id="p-disp">
  <div class="disp-panel">
    <div class="disp-hdr">
      <div class="disp-title">Pickup screen</div>
      <div class="disp-sub">Drivers — wait outside until your number appears</div>
    </div>
    <div class="disp-body">
      <div class="disp-sec">Ready now</div>
      <div id="d-ready"></div>
      <div class="disp-sec" style="margin-top:12px">Being prepared</div>
      <div class="qchips" id="d-queue"></div>
      <div class="disp-empty" id="d-empty" style="display:none">No active orders</div>
    </div>
  </div>
</div>

</div>
</div>

<script>
var PLAT={
  talabat:{label:'Talabat',color:'#FF6B35'},
  noon:{label:'Noon',color:'#d4a800'},
  careem:{label:'Careem',color:'#4CAF72'},
  hungerstation:{label:'HungerStation',color:'#FF2D55'},
  deliveroo:{label:'Deliveroo',color:'#00CCBC'},
  instashop:{label:'InstaShop',color:'#A855F7'}
};
var CANCEL=900;
var orders=[
  {id:1,num:'#1038',plat:'talabat',status:'ready',at:Date.now()-420000,readyAt:Date.now()-180000,items:[{qty:1,name:'Smash Burger'},{qty:2,name:'Loaded Fries'},{qty:1,name:'Lemonade'}],total:'AED 102',note:''},
  {id:2,num:'#2051',plat:'noon',status:'preparing',at:Date.now()-300000,readyAt:null,items:[{qty:2,name:'Double Cheese'},{qty:1,name:'Onion Rings'}],total:'AED 122',note:'No onions please'},
  {id:3,num:'#3017',plat:'careem',status:'preparing',at:Date.now()-180000,readyAt:null,items:[{qty:1,name:'Crispy Chicken'},{qty:1,name:'Soft Drink'}],total:'AED 53',note:''},
  {id:4,num:'#5002',plat:'deliveroo',status:'preparing',at:Date.now()-90000,readyAt:null,items:[{qty:3,name:'Smash Burger'},{qty:3,name:'Loaded Fries'}],total:'AED 192',note:'Extra sauce'}
];
var nextId=5,collected=4,busyMode=false,pending=null,expanded=null,darkMode=true;

function secsLeft(o){if(!o.readyAt)return null;return Math.max(0,CANCEL-Math.floor((Date.now()-o.readyAt)/1000));}
function fmtTime(s){var m=Math.floor(s/60),sc=s%60;return m+':'+(sc<10?'0':'')+sc;}
function timerCol(s){var p=s/CANCEL;return p>.5?'#22c55e':p>.25?'#f59e0b':'#ef4444';}
function ago(ts){var m=Math.floor((Date.now()-ts)/60000);return m<1?'just now':m+'m ago';}
function waitEst(o){return'~'+Math.max(2,15-Math.floor((Date.now()-o.at)/60000))+'m';}

function toggleMode(){
  darkMode=!darkMode;
  document.body.classList.toggle('light',!darkMode);
  document.getElementById('mode-btn').textContent=darkMode?'🌙':'☀️';
}

function refreshAll(){
  renderOrders();
  renderDisplay();
  updateStats();
  var btn=document.querySelector('.refresh-btn');
  btn.style.transform='rotate(360deg)';
  btn.style.transition='transform .4s';
  setTimeout(function(){btn.style.transform='';btn.style.transition='';},400);
}

function beep(){
  try{
    var ctx=new(window.AudioContext||window.webkitAudioContext)();
    [0,.18,.36].forEach(function(d){
      var o=ctx.createOscillator(),g=ctx.createGain();
      o.connect(g);g.connect(ctx.destination);
      o.frequency.value=880;o.type='sine';
      g.gain.setValueAtTime(0,ctx.currentTime+d);
      g.gain.linearRampToValueAtTime(0.4,ctx.currentTime+d+.02);
      g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+d+.18);
      o.start(ctx.currentTime+d);o.stop(ctx.currentTime+d+.2);
    });
  }catch(e){}
}

function addOrder(){
  var num=document.getElementById('inp-num').value.trim();
  var plat=document.getElementById('inp-plat').value;
  if(!num){document.getElementById('inp-num').focus();return;}
  document.getElementById('inp-num').value='';
  pending={id:nextId++,num:num,plat:plat,at:Date.now(),readyAt:null,items:[{qty:1,name:'Order item'}],total:'',note:''};
  var p=PLAT[plat];
  document.getElementById('inc-num').textContent=num;
  document.getElementById('inc-num').style.color=p.color;
  document.getElementById('inc-dot').style.background=p.color;
  document.getElementById('incoming').classList.add('show');
  beep();
}

function acceptOrder(){
  if(!pending)return;
  pending.status='preparing';
  orders.unshift(pending);
  pending=null;
  document.getElementById('incoming').classList.remove('show');
  renderOrders();renderDisplay();updateStats();
}

function rejectOrder(){
  pending=null;
  document.getElementById('incoming').classList.remove('show');
}

function markReady(id){
  var o=orders.find(function(x){return x.id===id;});
  if(o){o.status='ready';o.readyAt=Date.now();}
  renderOrders();renderDisplay();updateStats();
}

function markCollected(id){
  orders=orders.filter(function(x){return x.id!==id;});
  collected++;
  renderOrders();renderDisplay();updateStats();
}

function dismissExpired(id){
  orders=orders.filter(function(x){return x.id!==id;});
  renderOrders();renderDisplay();updateStats();
}

function toggleExpand(id){
  expanded=expanded===id?null:id;
  renderOrders();
}

function doReprint(id){
  var btn=document.getElementById('rp-'+id);
  if(btn){
    btn.textContent='Printed!';
    btn.classList.add('done');
    setTimeout(function(){btn.textContent='Reprint';btn.classList.remove('done');},2000);
  }
}

function toggleBusy(){
  busyMode=!busyMode;
  document.getElementById('busy-bar').classList.toggle('show',busyMode);
  document.getElementById('busy-main-btn').classList.toggle('on',busyMode);
  document.getElementById('busy-main-btn').textContent=busyMode?'Busy mode ON':'Busy mode';
}

function switchTab(t){
  ['orders','disp'].forEach(function(id){
    document.getElementById('t-'+id).classList.toggle('on',id===t);
    document.getElementById('p-'+id).classList.toggle('on',id===t);
  });
}

function renderOrders(){
  var wrap=document.getElementById('olist');
  orders.forEach(function(o){if(o.status==='ready'&&secsLeft(o)===0)o.status='expired';});
  if(!orders.length){wrap.innerHTML='<div class="empty-state">No active orders</div>';return;}
  var html='';
  orders.forEach(function(o){
    var p=PLAT[o.plat],isR=o.status==='ready',isE=o.status==='expired',isEx=expanded===o.id;
    var s=isR?secsLeft(o):null,pct=s!==null?Math.round(s/CANCEL*100):0,col=s!==null?timerCol(s):'';
    var items='';
    (o.items||[]).forEach(function(it){items+='<div class="drow"><span class="dqty">'+it.qty+'x</span><span class="dname">'+it.name+'</span></div>';});
    var totalHtml=o.total?'<div class="dtotal"><span class="dtotal-l">Total</span><span class="dtotal-n">'+o.total+'</span></div>':'';
    var noteHtml=o.note?'<div class="dnote">Note: '+o.note+'</div>':'';
    var timerHtml=isR?'<div class="timer-wrap"><div class="ttrack"><div class="tfill" id="tf-'+o.id+'" style="width:'+pct+'%;background:'+col+'"></div></div><div class="tlbl"><span>Auto-cancel in</span><span id="tl-'+o.id+'" style="color:'+col+'">'+fmtTime(s)+'</span></div></div>':'';
    var actionBtn=isE?'<button class="obtn obtn-red" onclick="event.stopPropagation();dismissExpired('+o.id+')">Expired — dismiss</button>':isR?'<button class="obtn obtn-gray" onclick="event.stopPropagation();markCollected('+o.id+')">Driver collected</button>':'<button class="obtn obtn-green" onclick="event.stopPropagation();markReady('+o.id+')">Mark ready</button>';
    var rpBtn=!isE?'<button class="reprint-btn" id="rp-'+o.id+'" onclick="event.stopPropagation();doReprint('+o.id+')">Reprint</button>':'';
    html+='<div class="ocard'+(isR?' ready':'')+(isE?' expired':'')+'" onclick="toggleExpand('+o.id+')">';
    html+='<div class="otop"><span class="pbadge" style="background:'+p.color+'22;color:'+p.color+'">'+p.label+'</span><span class="onum">'+o.num+'</span><span class="oage">'+ago(o.at)+'</span><span class="oarrow'+(isEx?' open':'')+'">▼</span></div>';
    html+='<div class="odetails'+(isEx?' open':'')+'">'+items+totalHtml+noteHtml+'</div>';
    html+=timerHtml;
    html+='<div class="ocard-btns">'+actionBtn+rpBtn+'</div>';
    html+='</div>';
  });
  wrap.innerHTML=html;
}

function updateTimers(){
  orders.forEach(function(o){
    if(o.status!=='ready')return;
    var s=secsLeft(o);
    if(s===0){o.status='expired';renderOrders();renderDisplay();updateStats();return;}
    var col=timerCol(s),pct=Math.round(s/CANCEL*100);
    var f=document.getElementById('tf-'+o.id),l=document.getElementById('tl-'+o.id);
    if(f){f.style.width=pct+'%';f.style.background=col;}
    if(l){l.textContent=fmtTime(s);l.style.color=col;}
  });
}

function updateStats(){
  document.getElementById('s-act').textContent=orders.filter(function(o){return o.status==='preparing';}).length;
  document.getElementById('s-rdy').textContent=orders.filter(function(o){return o.status==='ready';}).length;
  document.getElementById('s-don').textContent=collected;
}

function renderDisplay(){
  var ready=orders.filter(function(o){return o.status==='ready';});
  var prep=orders.filter(function(o){return o.status==='preparing';});
  var rh='';
  ready.forEach(function(o){
    var p=PLAT[o.plat];
    rh+='<div class="rtile"><span class="rtile-dot" style="background:'+p.color+'"></span><span class="rtile-num" style="color:'+p.color+'">'+o.num+'</span><div><div class="rtile-plat" style="color:'+p.color+'">'+p.label+'</div><span class="rtile-badge">Collect now</span></div></div>';
  });
  document.getElementById('d-ready').innerHTML=rh;
  var qh='';
  prep.forEach(function(o){
    var p=PLAT[o.plat];
    qh+='<div class="qchip"><span class="qdot" style="background:'+p.color+'"></span><span class="qnum" style="color:'+p.color+'">'+o.num+'</span><span class="qinfo">'+p.label+' · '+waitEst(o)+'</span></div>';
  });
  document.getElementById('d-queue').innerHTML=qh;
  document.getElementById('d-empty').style.display=orders.length===0?'block':'none';
}

document.getElementById('inp-num').addEventListener('keydown',function(e){if(e.key==='Enter')addOrder();});
renderOrders();renderDisplay();updateStats();
setInterval(updateTimers,1000);
</script>
</body>
</html>
