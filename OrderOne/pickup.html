<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OrderOne — Pickup Screen</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--orange:#FF6B2C;--black:#050505;--card:#111;--border:rgba(255,255,255,0.07);--green:#22c55e;--amber:#f59e0b;--blue:#3b82f6;--white:#F8F8F8;--gray:#666}
body{font-family:'DM Sans',sans-serif;background:var(--black);color:var(--white);min-height:100vh;display:flex;flex-direction:column}
.header{display:flex;justify-content:space-between;align-items:center;padding:16px 32px;border-bottom:1px solid var(--border)}
.logo{font-family:'Syne',sans-serif;font-size:22px;font-weight:800}.logo span{color:var(--orange)}
.header-right{display:flex;align-items:center;gap:12px}
.live{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--green);font-weight:600}
.live-dot{width:8px;height:8px;background:var(--green);border-radius:50%;animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}
.refresh-btn{background:var(--card);border:1px solid var(--border);color:var(--white);padding:6px 12px;border-radius:6px;cursor:pointer;font-size:13px;font-family:'DM Sans',sans-serif}

.notice{background:rgba(255,107,44,0.08);border-bottom:1px solid rgba(255,107,44,0.15);padding:14px 32px;font-size:14px;color:rgba(255,255,255,0.7);text-align:center}
.notice strong{color:var(--orange)}

.main{flex:1;padding:32px;display:flex;flex-direction:column;gap:32px}

/* READY SECTION */
.section-title{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;letter-spacing:2px;color:var(--gray);margin-bottom:16px;text-transform:uppercase}

.ready-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px}
.ready-card{background:var(--card);border-radius:16px;padding:28px 20px;text-align:center;border:1px solid var(--border);position:relative;overflow:hidden}
.ready-card.restaurant-order{border-color:rgba(34,197,94,0.3);background:rgba(34,197,94,0.04)}
.ready-card.bar-order{border-color:rgba(59,130,246,0.3);background:rgba(59,130,246,0.04)}
.ready-card::before{content:'READY';position:absolute;top:10px;right:10px;font-size:9px;font-weight:700;letter-spacing:1px;color:var(--green);background:rgba(34,197,94,0.1);padding:2px 8px;border-radius:100px}
.ready-platform{font-size:12px;font-weight:700;letter-spacing:0.5px;margin-bottom:12px;text-transform:uppercase}
.ready-num{font-family:'Syne',sans-serif;font-size:56px;font-weight:800;line-height:1;margin-bottom:8px}
.ready-counter{font-size:12px;color:var(--gray)}
.ready-box-alert{font-size:11px;color:var(--amber);margin-top:8px;background:rgba(245,158,11,0.08);padding:4px 8px;border-radius:6px}

/* SPLIT NOTIFICATION */
.split-alert{background:rgba(245,158,11,0.06);border:1px solid rgba(245,158,11,0.2);border-radius:12px;padding:16px 20px;margin-bottom:8px}
.split-title{font-size:12px;font-weight:700;color:var(--amber);letter-spacing:1px;margin-bottom:8px}
.split-row{display:flex;justify-content:space-between;font-size:13px}
.split-ready{color:var(--green)}
.split-waiting{color:var(--amber)}

/* PREPARING SECTION */
.prep-grid{display:flex;flex-wrap:wrap;gap:10px}
.prep-chip{background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:10px;padding:12px 16px;display:flex;flex-direction:column;gap:4px}
.prep-num{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;line-height:1}
.prep-platform{font-size:11px;color:var(--gray)}
.prep-eta{font-size:11px;color:var(--amber);font-weight:600}

.empty-ready{text-align:center;padding:48px;color:var(--gray);font-size:15px;border:1px dashed var(--border);border-radius:16px}
</style>
</head>
<body>
<div class="header">
  <div class="logo">Order<span>1</span> <span style="font-size:13px;color:var(--gray);font-weight:400;margin-left:8px">Pickup Screen</span></div>
  <div class="header-right">
    <div class="live"><div class="live-dot"></div>LIVE</div>
    <button class="refresh-btn" onclick="render()">↻ Refresh</button>
  </div>
</div>

<div class="notice">
  📦 <strong>Drivers:</strong> Wait outside — your order number will appear here when ready. Please have your <strong>packaging box</strong> ready before collecting.
</div>

<div class="main">
  <div>
    <div class="section-title">✓ Ready for collection</div>
    <div class="ready-grid" id="ready-grid">
      <div class="empty-ready">No orders ready yet — check back soon</div>
    </div>
  </div>

  <div id="split-section"></div>

  <div>
    <div class="section-title">⏳ Being prepared</div>
    <div class="prep-grid" id="prep-grid">
      <div style="color:var(--gray);font-size:13px">Kitchen is clear</div>
    </div>
  </div>
</div>

<script>
const PLATFORMS={Talabat:{color:'#FF6600'},Noon:{color:'#FCCD00'},Careem:{color:'#00A858'},HungerStation:{color:'#E5004B'},Deliveroo:{color:'#00CD9D'},InstaShop:{color:'#5BB26C'}};

function render(){
  let orders=[];
  try{
    const state=JSON.parse(localStorage.getItem('orderone_state')||'{}');
    orders=state.orders||[];
  }catch(e){}

  const ready=orders.filter(o=>o.status==='ready');
  const active=orders.filter(o=>o.status==='active');

  // READY GRID
  const readyGrid=document.getElementById('ready-grid');
  if(!ready.length){
    readyGrid.innerHTML='<div class="empty-ready">No orders ready yet — check back soon</div>';
  } else {
    readyGrid.innerHTML=ready.map(o=>{
      const pc=PLATFORMS[o.platform]?.color||'#888';
      return`<div class="ready-card ${(o.section||'restaurant')+'-order'}">
        <div class="ready-platform" style="color:${pc}">${o.platform}</div>
        <div class="ready-num" style="color:${pc}">${o.num}</div>
        <div class="ready-counter">${o.section==='bar'?'🍹 Bar Counter':'🍔 Restaurant Counter'}</div>
        <div class="ready-box-alert">📦 Have your box ready</div>
      </div>`;
    }).join('');
  }

  // SPLIT NOTIFICATIONS - drivers with 2 orders
  const splitSection=document.getElementById('split-section');
  // Group orders by platform to detect same-driver scenarios
  const splits=ready.filter(r=>active.some(a=>a.platform===r.platform));
  if(splits.length){
    splitSection.innerHTML=`<div>
      <div class="section-title">⚡ Driver split — one order ready, one still preparing</div>
      ${splits.map(r=>{
        const waiting=active.find(a=>a.platform===r.platform);
        const eta=Math.floor(Math.random()*8+3);
        return`<div class="split-alert">
          <div class="split-title">${r.platform} DRIVER — SPLIT ORDER</div>
          <div class="split-row">
            <span class="split-ready">✓ ${r.num} is READY — collect now</span>
            <span class="split-waiting">⏳ ${waiting.num} ready in ~${eta} min</span>
          </div>
        </div>`;
      }).join('')}
    </div>`;
  } else {
    splitSection.innerHTML='';
  }

  // PREPARING
  const prepGrid=document.getElementById('prep-grid');
  if(!active.length){
    prepGrid.innerHTML='<div style="color:var(--gray);font-size:13px">Kitchen is clear</div>';
  } else {
    prepGrid.innerHTML=active.map(o=>{
      const pc=PLATFORMS[o.platform]?.color||'#888';
      const eta=Math.floor(Math.random()*10+2);
      return`<div class="prep-chip">
        <div class="prep-num" style="color:${pc}">${o.num}</div>
        <div class="prep-platform">${o.platform}</div>
        <div class="prep-eta">~${eta} min</div>
      </div>`;
    }).join('');
  }
}

setInterval(render,5000);
render();
</script>
</body>
</html>
